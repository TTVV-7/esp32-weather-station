# Copy this file to `secrets.yaml` and fill in your own values.
# `secrets.yaml` is gitignored and must never be committed.

wifi_ssid: "YourWiFiSSID"
wifi_password: "YourWiFiPassword"

# Generate a random 32-byte base64 key:
#   python3 -c "import base64, os; print(base64.b64encode(os.urandom(32)).decode())"
api_encryption_key: "REPLACE_WITH_BASE64_32_BYTE_KEY"

# Choose any password for OTA flashing
ota_password: "choose-an-ota-password"

# Password for the fallback AP (shown if Wi-Fi fails)
fallback_ap_password: "choose-a-fallback-ap-password"

# Adafruit IO — free at io.adafruit.com (My Key -> Active Key)
adafruit_username: "your_adafruit_username"
adafruit_key: "aio_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
adafruit_feed_temperature: "your_adafruit_username/feeds/temperature"
adafruit_feed_humidity: "your_adafruit_username/feeds/humidity"
adafruit_feed_pressure: "your_adafruit_username/feeds/pressure"
